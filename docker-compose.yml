services:
  db:
    image: postgres:16
    container_name: ada_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ada}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ada}
      POSTGRES_DB: ${POSTGRES_DB:-ada_db}
    ports:
      - "5432:5432"
    volumes:
      # persistent PG data
      - db_data:/var/lib/postgresql/data

      # all schema / pipeline SQL - mount the actual db-init directory
      - ./Implementation/backend/db/db-init:/docker-entrypoint-initdb.d:ro

      # scraped json (shared directory) mounted read-only so db can see it if needed
      - ./Implementation/scraper/output:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ada} -d ${POSTGRES_DB:-ada_db} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./Implementation/backend
    container_name: ada_api
    env_file: ./Implementation/backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-ada_db}
      DB_USER: ${POSTGRES_USER:-ada}
      DB_PASS: ${POSTGRES_PASSWORD:-ada}
      # Note: GEMINI_API_KEY and GOOGLE_CSE_CX are loaded from env_file
      # GOOGLE_CSE_API_KEY needs to be added to Implementation/backend/.env file
      # with the same value as GEMINI_API_KEY
    volumes:
      # API needs write access to save search_results_raw.ndjson, chosen_seeds.ndjson, discovered_sites.ndjson
      - ./Implementation/scraper/output:/data
      # Mount scraper source code so backend can import it
      - ./Implementation/scraper:/app/scraper:ro
      # Mount backend code for development (allows code changes without rebuild)
      - ./Implementation/backend/main.py:/app/main.py
      - ./Implementation/backend/app:/app/app

volumes:
  db_data:
